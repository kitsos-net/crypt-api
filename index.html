<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kitsos Crypt API - OpenAPI Documentation</title>

    <!-- Swagger UI Styles -->
    <link rel="stylesheet" href="https://cdn.kitsos.net/api/swagger/5.29.1/swagger-ui.min.css">

    <!-- Favicons & Web App Meta -->
    <link rel="icon" type="image/png" href="https://cdn.kitsos.net/logos/fav/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="https://cdn.kitsos.net/logos/fav/favicon.svg" />
    <link rel="shortcut icon" href="https://cdn.kitsos.net/logos/fav/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://cdn.kitsos.net/logos/fav/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Kitsos" />
    <link rel="manifest" href="https://cdn.kitsos.net/logos/fav/site.webmanifest" />

    <style>
        body {
            margin: 0;
            background: #f8fafc;
        }

        .topbar {
            display: none;
        }

        .swagger-ui .opblock {
            border-radius: 10px;
        }

        .swagger-ui .opblock-summary {
            padding: 10px;
        }
    </style>
</head>

<body>
    <div id="openapi"></div>

    <!-- Swagger UI Scripts -->
    <script src="https://cdn.kitsos.net/api/swagger/5.29.1/swagger-ui-bundle.min.js"></script>
    <script src="https://cdn.kitsos.net/api/swagger/5.29.1/swagger-ui-standalone-preset.min.js"></script>

    <script>
        window.onload = function () {
            window.ui = SwaggerUIBundle({
                url: "./openapi.yaml",
                dom_id: "#openapi",

                deepLinking: true,
                displayRequestDuration: true,

                docExpansion: "list",
                defaultModelsExpandDepth: -1,
                defaultModelExpandDepth: 2,

                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],

                layout: "StandaloneLayout"
            });
        };
    </script>
</body>
</html>
