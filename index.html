<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kitsos Crypt API - OpenAPI Documentation</title>

    <!-- Swagger UI Styles -->
    <link rel="stylesheet" type="text/css" href="//cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.29.1/swagger-ui.css">
    
    <!-- Favicons & Web App Meta -->
    <link rel="icon" type="image/png" href="https://cdn.kitsos.net/logos/fav/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="https://cdn.kitsos.net/logos/fav/favicon.svg" />
    <link rel="shortcut icon" href="https://cdn.kitsos.net/logos/fav/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://cdn.kitsos.net/logos/fav/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Kitsos" />
    <link rel="manifest" href="https://cdn.kitsos.net/logos/fav/site.webmanifest" />
</head>

<body>
    <!-- Container für die API-Dokumentation -->
    <div id="openapi"></div>

    <!-- Swagger UI Scripts -->
    <script src="//cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.29.1/swagger-ui.js"></script>
    <script>
        window.onload = function () {
            const ui = SwaggerUIBundle({
                url: "openapi.yaml", 
                dom_id: "#openapi"
            })
        }
    </script>
</body>
</html>
